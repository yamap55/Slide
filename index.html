<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>reveal.js</title>
    <link rel="icon" href="pic/favicon.ico">

    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/reveal.js/6.0.1/reveal.min.css">
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/reveal.js/6.0.1/theme/black.min.css">

    <!-- Theme used for syntax highlighting of code -->
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/reveal.js/6.0.1/plugin/highlight/zenburn.min.css">

    <script>
      // リクエストパラメータを取得
      function getRequestParameters() {
        return location.search.substring(1).split("&").reduce((acc, cur) => {
          const element = cur.split("=");
          acc[decodeURIComponent(element[0])] = decodeURIComponent(element[1]);
          return acc;
        }, {});
      };

      window.addEventListener("load", () => {
        if (document.location.search.length < 1) {
          alert("URLの末尾にマークダウンファイルのPATHを指定してください。例 : 「?slide=20170827/example.md」")
          return
        }
        const parameters = getRequestParameters();
        const markdownUrl = parameters["slide"];
        if (!markdownUrl) {
          alert("URLの末尾にマークダウンファイルのPATHを指定してください。例 : 「?slide=20170827/example.md」")
          return
        }

        // Slide指定
        document.getElementById("slide").dataset.markdown = markdownUrl;

        // reveal.js 4.x 以降はプラグインを plugins 配列で登録する
        // （プラグイン本体は body 末尾で読み込み、グローバル変数として公開される）
        // ハイライトは RevealHighlight が自動適用するため hljs の手動初期化は不要
        Reveal.initialize({
          plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
        });
        Reveal.on("ready", (event) => {
            // タイトル設定
          const getTitle = () => {
            try {
                const h1 = document.getElementsByTagName("h1")[0];
                if (h1) {
                    return h1.innerText
                } else {
                    // h1が存在しない場合にはh2を代用
                    return document.getElementsByTagName("h2")[0].innerText
                }
            } catch {
                return ""
            }
          }
          document.title = getTitle()

          // fix img.src to relative path from index.html
          const url = location.href.replace(/\?.*$/,"");
          const mainPath = url.substring(0,url.lastIndexOf("/"));
          const markDownDirPath = markdownUrl.substring(0, markdownUrl.lastIndexOf("/"));
          Array.from(document.getElementsByTagName("img"), el => {
            const imagePath = el.getAttribute("src");
            const relativePath = imagePath.split(mainPath)[1];
            if (!relativePath && imagePath.match(/^(https?:)?\/\//)) {
              // another domain and absolute path case
              return;
            }
            const result = relativePath ? markDownDirPath + relativePath : markDownDirPath + "/" + imagePath;
            el.setAttribute("src",result);
          });
        });
      });
      </script>

    <style type="text/css">
      /* タイトルの大文字変換を無効 */
      .reveal h1,
      .reveal h2,
      .reveal h3,
      .reveal h4,
      .reveal h5,
      .reveal h6 {
        text-transform: none;
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides" id="slides">
        <section data-separator="^\r?\n---\r?\n$" data-separator-vertical="^\r?\n--\r?\n$" id="slide" />
      </div>
    </div>
    <script src="//cdnjs.cloudflare.com/ajax/libs/reveal.js/6.0.1/reveal.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/reveal.js/6.0.1/plugin/markdown.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/reveal.js/6.0.1/plugin/highlight.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/reveal.js/6.0.1/plugin/notes.min.js"></script>
  </body>
</html>
